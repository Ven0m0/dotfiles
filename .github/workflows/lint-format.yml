name: Lint & Format
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  lint-format:
    uses: Ven0m0/.github/.github/workflows/lint-format.yml@main
    secrets: inherit
  qlty-fmt:
    needs: lint-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: qltysh/qlty-action/fmt@v2
      - name: Verify no qlty formatting changes are needed
        run: |
          git diff --exit-code || {
            git --no-pager diff --stat
            echo "::error::Qlty formatting changes are required. Apply the qlty GitHub App changes (or an equivalent formatting commit) to this branch, then rerun CI."
            exit 1
          }
