# NOTE: mousepoll/kbpoll are also set via the kernel cmdline in
#       etc/sdboot-manage.conf (usbhid.mousepoll=1 / usbhid.kbpoll=1).
#       Keep the values in both places in sync. Having both is intentional
#       here to cover cases where usbhid is built-in vs loaded as a module.
options usbhid mousepoll=1 kbpoll=1
