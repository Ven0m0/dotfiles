config_version = "0"

exclude_patterns = ["**/node_modules/**"]
test_patterns = ["**/test/**"]

[[source]]
name = "default"
default = true

[[plugin]]
name = "actionlint"

[[plugin]]
name = "prettier"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "yamllint"

[[triage]]
match.file_patterns = [".github/workflows/*"]
match.rules = ["yamllint:line-length"]
set.ignored = true
